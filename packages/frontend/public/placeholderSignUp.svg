<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f5ff"/>
      <stop offset="100%" style="stop-color:#ffe8f5"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B3FBF"/>
      <stop offset="100%" style="stop-color:#FF63B9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="50" fill="#E0C4FF" opacity="0.25"/>
  <circle cx="520" cy="500" r="70" fill="#FFD6F0" opacity="0.25"/>
  <circle cx="500" cy="80" r="40" fill="#FFB8E6" opacity="0.3"/>
  
  <!-- Main illustration group -->
  <g transform="translate(180, 120)">
    <!-- Phone device -->
    <rect x="0" y="20" width="180" height="350" rx="20" fill="#fff" stroke="url(#purple)" stroke-width="5"/>
    <rect x="15" y="35" width="150" height="290" rx="12" fill="url(#purple)"/>
    
    <!-- Lock icon on phone screen -->
    <g transform="translate(60, 120)">
      <!-- Lock body -->
      <rect x="10" y="30" width="50" height="45" rx="8" fill="#fff" opacity="0.95"/>
      <!-- Lock shackle -->
      <path d="M 20 30 L 20 15 Q 20 5 35 5 Q 50 5 50 15 L 50 30" 
            stroke="#fff" stroke-width="6" fill="none" opacity="0.95"/>
      <!-- Keyhole -->
      <circle cx="35" cy="47" r="5" fill="url(#purple)"/>
      <rect x="32" y="50" width="6" height="12" rx="2" fill="url(#purple)"/>
    </g>
    
    <!-- Phone checkmark badge -->
    <g transform="translate(130, 200)">
      <circle cx="0" cy="0" r="20" fill="#4CAF50"/>
      <path d="M -6 0 L -2 5 L 8 -8" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Phone details -->
    <circle cx="90" cy="350" r="12" fill="#fff" opacity="0.3"/>
    <rect x="60" y="10" width="60" height="4" rx="2" fill="#333" opacity="0.2"/>
  </g>
  
  <!-- Security shield icon -->
  <g transform="translate(410, 250)">
    <path d="M 30 10 L 50 18 L 50 48 Q 50 60 40 68 L 30 73 L 20 68 Q 10 60 10 48 L 10 18 Z" 
          fill="url(#purple)" opacity="0.85"/>
    <path d="M 30 28 L 24 38 L 27 38 L 34 50 L 44 28 L 39 28 L 34 36 Z" 
          fill="#fff"/>
  </g>
  
  <!-- Floating lock icon -->
  <g transform="translate(420, 150)">
    <rect x="0" y="8" width="24" height="20" rx="4" fill="#FF63B9" opacity="0.7"/>
    <path d="M 4 8 L 4 3 Q 4 0 12 0 Q 20 0 20 3 L 20 8" 
          stroke="#FF63B9" stroke-width="3" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Sparkle stars for welcome effect -->
  <g transform="translate(450, 380)">
    <path d="M0,-12 L2.5,-2.5 L12,0 L2.5,2.5 L0,12 L-2.5,2.5 L-12,0 L-2.5,-2.5 Z" 
          fill="url(#purple)" opacity="0.6"/>
  </g>
  <g transform="translate(380, 430)">
    <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z" 
          fill="#FFD700" opacity="0.7"/>
  </g>
  <g transform="translate(480, 320)">
    <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" 
          fill="#FF63B9" opacity="0.5"/>
  </g>
  
  <!-- Small decorative elements -->
  <circle cx="100" cy="450" r="6" fill="#8B3FBF" opacity="0.4"/>
  <circle cx="480" cy="100" r="5" fill="#FF63B9" opacity="0.5"/>
  <circle cx="520" cy="450" r="4" fill="#FFB8E6" opacity="0.6"/>
  
  <!-- Welcome dots -->
  <g transform="translate(150, 480)">
    <circle cx="0" cy="0" r="4" fill="url(#purple)" opacity="0.5"/>
    <circle cx="15" cy="0" r="4" fill="url(#purple)" opacity="0.6"/>
    <circle cx="30" cy="0" r="4" fill="url(#purple)" opacity="0.7"/>
  </g>
</svg>