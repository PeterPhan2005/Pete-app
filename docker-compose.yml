version: '3.8'

services:
  # Redis for Socket.io adapter and caching
  redis:
    image: redis:7-alpine
    container_name: pete-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pete-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ for message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pete-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pete-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API + Socket.io Server - Instance 1
  backend-1:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: pete-backend-1
    restart: unless-stopped
    env_file:
      - ./packages/backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CLIENT_URL: http://localhost
      INSTANCE_ID: backend-1
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend-1-node_modules:/app/node_modules
      - ./packages/backend:/app
    networks:
      - pete-network

  # Backend API + Socket.io Server - Instance 2
  backend-2:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: pete-backend-2
    restart: unless-stopped
    env_file:
      - ./packages/backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CLIENT_URL: http://localhost
      INSTANCE_ID: backend-2
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend-2-node_modules:/app/node_modules
      - ./packages/backend:/app
    networks:
      - pete-network

  # Backend API + Socket.io Server - Instance 3
  backend-3:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: pete-backend-3
    restart: unless-stopped
    env_file:
      - ./packages/backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CLIENT_URL: http://localhost
      INSTANCE_ID: backend-3
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend-3-node_modules:/app/node_modules
      - ./packages/backend:/app
    networks:
      - pete-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: pete-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
      - frontend
    networks:
      - pete-network

  # Frontend React Application
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: pete-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost/api
      VITE_SOCKET_URL: http://localhost
    volumes:
      - frontend-node_modules:/app/node_modules
      - ./packages/frontend:/app
    networks:
      - pete-network

networks:
  pete-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  backend-1-node_modules:
  backend-2-node_modules:
  backend-3-node_modules:
  frontend-node_modules:
